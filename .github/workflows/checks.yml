name: Check

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
    branches:
      - master
    paths:
      - appdaemon
      - integration
      - plugin
      - python_script
      - template
      - theme

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  preflight:
    runs-on: ubuntu-latest
    name: Preflight
    outputs:
      repository: ${{ steps.repository.outputs.repository }}
      category: ${{ steps.category.outputs.category }}
      run-type: ${{ steps.run-type.outputs.run-type }}
    steps:
      - name: Determine run type
        id: run-type
        env:
          HAS_REMOVAL: ${{ contains(github.event.pull_request.labels.*.name, 'remove-repositories') }}
          HAS_NEW_REPO: ${{ contains(github.event.pull_request.labels.*.name, 'New default repository') }}
          HAS_RENAMED: ${{ contains(github.event.pull_request.labels.*.name, 'renamed-repositories') }}
        run: |
          count=0
          [ "$HAS_REMOVAL" == "true" ] && count=$((count + 1))
          [ "$HAS_NEW_REPO" == "true" ] && count=$((count + 1))
          [ "$HAS_RENAMED" == "true" ] && count=$((count + 1))

          if [ "$count" -gt 1 ]; then
            echo "::error::Only one of the labels 'remove-repositories', 'New default repository', 'renamed-repositories' may be set" >&2
            exit 1
          fi

          if [ "$HAS_REMOVAL" == "true" ]; then
            echo "run-type=removal" >> $GITHUB_OUTPUT
          elif [ "$HAS_NEW_REPO" == "true" ]; then
            echo "run-type=new-repository" >> $GITHUB_OUTPUT
          elif [ "$HAS_RENAMED" == "true" ]; then
            echo "run-type=rename" >> $GITHUB_OUTPUT
          else
            echo "run-type=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Check out repository
        if: steps.run-type.outputs.run-type == 'new-repository'
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        if: steps.run-type.outputs.run-type == 'new-repository'
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Clone origin
        if: steps.run-type.outputs.run-type == 'new-repository'
        run: git clone --depth 1 https://github.com/hacs/default /tmp/repositories/default

      - name: Set repository
        id: repository
        if: steps.run-type.outputs.run-type == 'new-repository'
        run: echo "repository=$(python3 -m scripts.changed.repo)" >> $GITHUB_OUTPUT

      - name: Set category
        id: category
        if: steps.run-type.outputs.run-type == 'new-repository'
        run: echo "category=$(python3 -m scripts.changed.category)" >> $GITHUB_OUTPUT

  owner:
    runs-on: ubuntu-latest
    name: Owner
    needs: preflight
    if: needs.preflight.outputs.run-type == 'new-repository'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies if needed
        run: scripts/setup

      - name: Run the check
        run: python3 -m scripts.check.owner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{needs.preflight.outputs.repository}}

  editable:
    runs-on: ubuntu-latest
    name: Editable PR
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: "requirements.txt"


      - name: Install dependencies if needed
        run: scripts/setup

      - name: Run the check
        run: python3 -m scripts.check.edits

  releases:
    runs-on: ubuntu-latest
    name: Releases
    needs: preflight
    if: needs.preflight.outputs.run-type == 'new-repository'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies if needed
        run: scripts/setup

      - name: Run the check
        run: python3 -m scripts.check.releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{needs.preflight.outputs.repository}}

  removed:
    runs-on: ubuntu-latest
    name: Removed repository
    needs: preflight
    if: needs.preflight.outputs.run-type == 'new-repository'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies if needed
        run: scripts/setup

      - name: Run the check
        run: python3 -m scripts.check.removed
        env:
          REPOSITORY: ${{needs.preflight.outputs.repository}}

  existing:
    runs-on: ubuntu-latest
    name: Existing repository
    needs: preflight
    if: needs.preflight.outputs.run-type == 'new-repository'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: ".python-version"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies if needed
        run: scripts/setup

      - name: Run the check
        run: python3 -m scripts.check.existing
        env:
          REPOSITORY: ${{needs.preflight.outputs.repository}}

  hassfest:
    runs-on: ubuntu-latest
    name: Hassfest
    needs: preflight
    if: needs.preflight.outputs.category == 'integration' && needs.preflight.outputs.run-type == 'new-repository'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Clone new addition
        run: |
          git clone --depth 1 "https://github.com/${{needs.preflight.outputs.repository}}" /tmp/repositories/addition

      - name: Run hassfest
        run: |
          integration=$(python3 -m scripts.helpers.integration_path)
          domain=$(python3 -m scripts.helpers.domain)
          docker run --rm \
            -v "$integration":"/github/workspace/$domain" \
            ghcr.io/home-assistant/hassfest:latest

  hacs:
    runs-on: ubuntu-latest
    name: HACS action
    needs: preflight
    if: needs.preflight.outputs.run-type == 'new-repository'
    steps:
      - name: HACS action
        uses: hacs/action@main
        with:
          repository: ${{needs.preflight.outputs.repository}}
          category: ${{needs.preflight.outputs.category}}
